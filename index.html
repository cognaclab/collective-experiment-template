<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RIKEN Questionnaire</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!--
    PRODUCTION ENTRYPOINT (professional / participant-facing)
    --------------------------------------------------------
    - Next-only navigation
    - No trial badge
    - No debug/reset/export controls

    For the transparent trial/verification version, use trial.html.
  -->

  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__left">
        <div class="topbar__title">RIKEN Questionnaire</div>
        <div id="pageMeta" class="topbar__meta"></div>
      </div>

      <div class="topbar__right">
        <div class="progress">
          <div class="progress__track" aria-label="Progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress__fill"></div>
          </div>
          <div id="progressText" class="progress__text">0%</div>
        </div>
        <div class="topbar__rightRow">
          <div id="autosaveText" class="autosave">Autosave: —</div>
        </div>
      </div>
    </div>
  </header>

  <main class="paper" id="app" aria-live="polite"></main>

  <footer class="paper footerNav">
    <div class="footerNav__left">
      <!-- Production is Next-only by request -->
      <button id="btnNext" type="button" class="btn btn--primary">Next</button>
    </div>
  </footer>

  <!-- Config (edit this file for easy customization) -->
  <script src="./config.js" defer></script>

  <!-- Data files (edit these to modify items; keep wording EXACT for established instruments) -->
  <script src="./data/demographics.js" defer></script>
  <script src="./data/hexaco100.js" defer></script>
  <script src="./data/ipip120.js" defer></script>
  <script src="./data/mfq30.js" defer></script>
  <script src="./data/d70.js" defer></script>
  <script src="./data/svo.js" defer></script>
  <script src="./data/math_checks.js" defer></script>

  <!-- App -->
  <script src="./app.js" defer></script>
</body>
</html>
