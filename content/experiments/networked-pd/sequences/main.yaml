sequence:
  # Introduction and Instructions
  - scene: "welcome"
    type: "instruction"
    content: "welcome.md"
    next: "pd-instructions"

  - scene: "pd-instructions"
    type: "instruction"
    content: "pd-rules.md"
    next: "network-instructions"

  - scene: "network-instructions"
    type: "instruction"
    content: "network-intro.md"
    next: "ostracism-instructions"

  - scene: "ostracism-instructions"
    type: "instruction"
    content: "ostracism-rules.md"
    next: "SceneWaitingRoom"

  # Waiting for full group
  - scene: "SceneWaitingRoom"
    type: "waiting"
    next: "ScenePDPairing"

  # Main game loop: 3 rounds × 2 turns = 6 total interactions
  # Dynamic looping is handled in handleSceneComplete.js:
  # - After ScenePDResults: if more turns needed → loop back to ScenePDChoice
  # - After SceneNetworkUpdate: if more rounds needed → loop back to ScenePDPairing

  # Pairing scene - shows partner for this round (same partner for all turns in round)
  - scene: "ScenePDPairing"
    type: "pairing"
    params:
      turnsPerRound: 2
      totalRounds: 3
    next: "ScenePDChoice"

  # Choice scene - make cooperate/defect decision
  - scene: "ScenePDChoice"
    type: "choice"
    params:
      maxChoiceTime: 20000
      showTimer: true
      showPartner: true
    next: "ScenePDResults"

  # Results scene - view both players' choices and payoffs
  # Server intercepts transition: if more turns in round → ScenePDChoice, else → SceneOstracismVote
  - scene: "ScenePDResults"
    type: "results"
    params:
      showBothChoices: true
    next: "SceneOstracismVote"

  # Ostracism vote - vote to continue or break connection with partner
  - scene: "SceneOstracismVote"
    type: "ostracism"
    next: "SceneNetworkUpdate"

  # Network update - shows network changes after ostracism
  # Server intercepts transition: if more rounds → ScenePDPairing, else → SceneGoToQuestionnaire
  - scene: "SceneNetworkUpdate"
    type: "network_update"
    next: "ScenePDPairing"

  # Phase transition - shown between blind and transparent phases
  # Server dynamically invokes this scene when transitioning between experiment phases
  - scene: "ScenePhaseTransition"
    type: "phase_transition"
    next: "ScenePDPairing"

  # Questionnaire
  - scene: "SceneGoToQuestionnaire"
    type: "questionnaire"
    next: "end"

  # End
  - scene: "end"
    type: "completion"
    redirect: "/endPage"
