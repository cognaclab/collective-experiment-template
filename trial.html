<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RIKEN Questionnaire — Trial / Verification</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!--
    TRIAL / VERIFICATION ENTRYPOINT (transparent)
    -------------------------------------------
    - Clearly marked TRIAL
    - Allows trial-only transparency UI in app.js (reverse-keying markers, verification text)
    - Can enable extra debug tools with ?debug=1

    IMPORTANT: This page is for researchers/testers, not participants.
    Participants should use index.html (production).
  -->

  <!-- Force trial mode regardless of URL params -->
  <script>
    window.__RIKEN_FORCE_MODE = 'trial';
  </script>

  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__left">
        <div class="topbar__title">RIKEN Questionnaire</div>
        <div id="pageMeta" class="topbar__meta"></div>
      </div>

      <div class="topbar__right">
        <div class="progress">
          <div class="progress__track" aria-label="Progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progress__fill"></div>
          </div>
          <div id="progressText" class="progress__text">0%</div>
        </div>
        <div class="topbar__rightRow">
          <div id="autosaveText" class="autosave">Autosave: —</div>
          <div id="trialBadge" class="trialBadge">TRIAL</div>
        </div>
      </div>
    </div>
  </header>

  <main class="paper" id="app" aria-live="polite"></main>

  <footer class="paper footerNav">
    <div class="footerNav__left">
      <button id="btnPrev" type="button" class="btn btn--secondary">Previous</button>
      <button id="btnNext" type="button" class="btn btn--primary">Next</button>
    </div>

    <!--
      Trial-only area (used by app.js to inject debug tools when ?debug=1)
      No reset button is provided (per request).
    -->
    <div class="footerNav__right" id="trialControls"></div>
  </footer>

  <!-- Config (edit this file for easy customization) -->
  <script src="./config.js" defer></script>

  <!-- Data files -->
  <script src="./data/demographics.js" defer></script>
  <script src="./data/hexaco100.js" defer></script>
  <script src="./data/ipip120.js" defer></script>
  <script src="./data/mfq30.js" defer></script>
  <script src="./data/d70.js" defer></script>
  <script src="./data/svo.js" defer></script>
  <script src="./data/math_checks.js" defer></script>

  <!-- App -->
  <script src="./app.js" defer></script>
</body>
</html>
